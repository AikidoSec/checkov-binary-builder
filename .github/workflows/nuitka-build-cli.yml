# Option B: include dynamic modules via CLI --include-module flags
on:
  push:
    branches:
      - nuitka-build
  workflow_dispatch:

name: Nuitka Build (Option B - CLI)

jobs:
  github-release:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.sha }}-cli
          release_name: Release v${{ github.sha }} (cli)
          draft: false
          prerelease: false
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: v${{ github.sha }}

  build-release-artifacts:
    strategy:
      matrix:
        include:
          - os: macos-14-xlarge
            name: darwin
            suffix: "ARM64"
          - os: ubuntu-22.04
            name: linux
            suffix: "X86_64"
    needs: [github-release]
    if: needs.github-release.outputs.upload_url != ''
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9 # v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9 # v3
        with:
          repository: bridgecrewio/checkov
          ref: 3.2.473
          path: checkov-src
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6 # v6
        with:
          python-version: "3.9"

      - name: Install pipenv
        run: |
          python -m pip install --no-cache-dir --upgrade pipenv

      - name: Set Python path for pipenv
        run: echo "PYTHON_PATH=$(which python)" >> $GITHUB_ENV

      - name: Install dependencies from checkov repo and Nuitka
        run: |
          cd checkov-src && PIPENV_VENV_IN_PROJECT=1 pipenv sync --python "$PYTHON_PATH"
          cd checkov-src && pipenv run pip install -e . && pipenv run pip install nuitka

      - name: Discover checkov modules for Nuitka
        run: checkov-src/.venv/bin/python scripts/discover_checkov_modules.py

      - name: List nuitka-generated
        run: |
          ls -la nuitka-generated/
          head -20 nuitka-generated/nuitka-include-modules.txt

      - name: Build executable (Option B - CLI include-module)
        run: |
          INCLUDE_MODULES=""
          while read -r m; do
            INCLUDE_MODULES="$INCLUDE_MODULES --include-module=$m"
          done < nuitka-generated/nuitka-include-modules.txt
          checkov-src/.venv/bin/python -m nuitka \
            --standalone \
            --follow-imports \
            --output-filename=checkov-nuitka \
            $INCLUDE_MODULES \
            --include-package=checkov \
            --include-package-data=checkov \
            --include-data-dir=checkov=checkov-src/checkov \
            --include-package-data=hcl2 \
            --include-package-data=license_expression \
            --include-package-data=spdx \
            --include-package-data=pycep \
            --include-package-data=detect_secrets \
            --include-package-data=policy_sentry \
            --include-package-data=cloudsplaining \
            --include-module=cloudsplaining \
            --include-package=detect_secrets.plugins \
            --include-package=cloudsplaining.scan \
            --lto=yes \
            --assume-yes-for-downloads \
            checkov/main.py

      - name: Zip artifact
        run: |
          DIST_DIR=$(find . -maxdepth 1 -type d -name "*.dist" | head -1)
          if [ -z "$DIST_DIR" ]; then echo "No .dist folder found"; exit 1; fi
          zip -r checkov.zip "$DIST_DIR"

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.github-release.outputs.upload_url }}
          asset_path: checkov.zip
          asset_name: checkov_cli_${{ matrix.name }}_${{ matrix.suffix }}.zip
          asset_content_type: application/zip
