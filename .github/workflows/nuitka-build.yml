on:
  push:
    branches:
      - nuitka-build
  workflow_dispatch:

name: Build Checkov Binary Using Nuitka

jobs:
  github-release:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.sha }}
          release_name: Release v${{ github.sha }}
          draft: false
          prerelease: false
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: v${{ github.sha }}

  build-release-artifacts:
    strategy:
      matrix:
        include:
          # macOS ARM64 (Apple Silicon)
          - os: macos-14-xlarge
            name: darwin
            suffix: "ARM64"
            python_arch: "arm64"
            python_version: "3.8"
          # macOS Intel (x86_64) — macos-13 deprecated; use macos-14-large for x86_64
          - os: macos-14-large
            name: darwin
            suffix: "X86_64"
            python_arch: "x64"
            python_version: "3.8"
          # Linux x86_64
          - os: ubuntu-22.04
            name: linux
            suffix: "X86_64"
            python_arch: "x64"
            python_version: "3.8"
          # Linux ARM64
          - os: ubuntu-22.04-arm
            name: linux
            suffix: "ARM64"
            python_arch: "arm64"
            python_version: "3.8"
          # Windows x64
          - os: windows-latest
            name: windows
            suffix: "X86_64"
            python_arch: "x64"
            python_version: "3.8"
          # Windows 32-bit (uses 32-bit Python on x64 runner)
          - os: windows-latest
            name: windows
            suffix: "X86"
            python_arch: "x86"
            python_version: "3.8"
          # Windows ARM64 (Python 3.9 not available for win32+arm64; use 3.12 + manual install)
          - os: windows-11-arm
            name: windows
            suffix: "ARM64"
            python_arch: "arm64"
            python_version: "3.12"
    needs: [github-release]
    if: needs.github-release.outputs.upload_url != ''
    runs-on: ${{ matrix.os }}
    # Windows: use bash so Unix commands (find, zip) work; optional architecture for 32-bit Python
    defaults:
      run:
        shell: bash
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9 # v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9 # v3
        with:
          repository: bridgecrewio/checkov
          ref: 3.2.501
          path: checkov-src
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6 # v6
        if: matrix.os != 'windows-11-arm'
        with:
          python-version: ${{ matrix.python_version }}
          architecture: ${{ matrix.python_arch }}

      - name: Install Python 3.12 ARM64 (Windows ARM64 only)
        if: matrix.os == 'windows-11-arm'
        run: |
          curl -sL -o python-installer.exe "https://www.python.org/ftp/python/3.12.4/python-3.12.4-arm64.exe"
          ./python-installer.exe /quiet InstallAllUsers=0 PrependPath=1
          PYROOT="${HOME}/AppData/Local/Programs/Python/Python312"
          for i in $(seq 1 30); do [ -x "${PYROOT}/python.exe" ] && break; echo "Waiting for Python install..."; sleep 2; done
          echo "PATH=${PYROOT}:${PYROOT}/Scripts:$PATH" >> "$GITHUB_ENV"

      - name: Install pipenv
        run: |
          python -m pip install --no-cache-dir --upgrade pipenv

      # On macOS Intel (macos-14-large), Python's _hashlib expects OpenSSL at /usr/local/opt/openssl@3.
      # Nuitka's dependency scan fails if it sees two OpenSSL paths (e.g. /usr/local/lib vs openssl@3).
      # See: https://github.com/Nuitka/Nuitka/issues/2853
      - name: Install OpenSSL on macOS Intel (for Nuitka _hashlib dependency scan)
        if: matrix.os == 'macos-14-large'
        run: |
          export PATH="/usr/local/bin:/opt/homebrew/bin:$PATH"
          brew install openssl@3
          # Python x64 expects /usr/local/opt/openssl@3; create if missing (runner may not allow brew to link there)
          if [ ! -f /usr/local/opt/openssl@3/lib/libssl.3.dylib ]; then
            VER=$(ls -1 "$(brew --prefix)/Cellar/openssl@3" 2>/dev/null | head -1)
            [ -n "$VER" ] && sudo mkdir -p /usr/local/opt && sudo ln -sf "$(brew --prefix)/Cellar/openssl@3/$VER" /usr/local/opt/openssl@3
          fi
          # Avoid duplicate-DLL failure: remove any symlinks in /usr/local/lib that would make Nuitka see two OpenSSL copies
          for f in /usr/local/lib/libcrypto*.dylib /usr/local/lib/libssl*.dylib; do
            [ -L "$f" ] && sudo rm -f "$f" || true
          done
          test -f /usr/local/opt/openssl@3/lib/libssl.3.dylib || (echo "OpenSSL path still missing"; exit 1)

      - name: Install dependencies and Nuitka
        working-directory: checkov-src
        run: |
          pipenv sync --python ${{ matrix.python_version }}
          pipenv run python -m pip install "nuitka>=1.9,<4"

      - name: List directory contents
        run: ls -la . && ls -la checkov-src

      #  pipenv run python -m nuitka \
      #  --standalone \
      #  --follow-imports \
      #  --include-module=site \
      #  --include-module=checkov \
      #  --include-package=cloudsplaining \
      #  --include-package=detect_secrets.plugins \
      #  --include-package=cloudsplaining.scan \
      #  --include-package=colorama \
      #  --include-package=tqdm \
      #  --include-package-data=hcl2 \
      #  --include-package-data=spdx-tools \
      #  --include-package-data=pycep \
      #  --include-package-data=detect_secrets \
      #  --include-package-data=policyuniverse \
      #  --include-package-data=policy_sentry \
      #  --include-package-data=cloudsplaining \
      #  --include-data-dir=checkov=checkov \
      #  --include-package-data=checkov \
      #  --enable-plugin=pylint-warnings \
      #  --output-filename=checkov-nuitka \
      #  --lto=yes \
      #  --assume-yes-for-downloads \
      #  --report=compilation-report.xml \
      #  --enable-plugin=anti-bloat \
      #  --noinclude-pytest-mode=nofollow \
      #  --noinclude-setuptools-mode=nofollow \
      #  --follow-stdlib \
      #  --prefer-source-code \
      #  --python-flag=no_asserts \
      #  --python-flag=-O \
      #  checkov/main.py

      - name: Patch checkov __init__.py for Nuitka runtime
        run: python scripts/patch_checkov_for_nuitka.py

      - name: Copy Nuitka wrapper entry (import random before checkov/numpy)
        run: cp scripts/entry_nuitka.py checkov-src/entry_nuitka.py

      - name: Build executable
        working-directory: checkov-src
        run: |
          # On macOS Intel, drop Homebrew from PATH so Nuitka sees only one OpenSSL (Nuitka#2853)
          if [ "${{ matrix.os }}" = "macos-14-large" ]; then
            export PATH=$(python -c "print(':'.join(p for p in os.environ['PATH'].split(':') if p not in ('/usr/local/bin','/opt/homebrew/bin')))")
          fi
          # Stdlib modules required by numpy/C extensions and asteval (e.g. randbits from random)
          # Plugin numpy improves numpy C-extension and random.randbits resolution in standalone
          # Entry script imports random first so numpy.random.bit_generator finds randbits
          pipenv run python -m nuitka \
          --standalone \
          --onefile \
          --follow-imports \
          --plugin-enable=numpy \
          --prefer-source-code \
          --include-module=random \
          --include-module=secrets \
          --include-module=struct \
          --include-module=warnings \
          --include-module=functools \
          --include-module=copy \
          --include-module=decimal \
          --include-module=operator \
          --include-module=math \
          --output-filename=checkov-nuitka \
          --include-package=checkov \
          --include-package-data=checkov \
          --include-data-dir=checkov=checkov \
          --include-package-data=hcl2 \
          --include-package-data=license_expression \
          --include-package-data=spdx_tools \
          --include-package-data=pycep \
          --include-package-data=detect_secrets \
          --include-package-data=policy_sentry \
          --include-package-data=cloudsplaining \
          --include-module=cloudsplaining \
          --include-package=detect_secrets.plugins \
          --include-package=cloudsplaining.scan \
          --lto=yes \
          --assume-yes-for-downloads \
          --include-module=checkov.terraform.context_parsers \
          --include-module=checkov.terraform.checks \
          --include-module=checkov.terraform.module_loading \
          --include-module=checkov.dockerfile.checks \
          --include-module=checkov.arm.checks \
          --include-module=checkov.cloudformation.checks \
          --include-module=checkov.common.bridgecrew \
          --include-module=checkov.kubernetes.checks \
          --include-module=checkov.openapi.checks \
          --include-module=checkov.serverless.checks \
          entry_nuitka.py

      - name: List directory contents
        run: ls -la checkov-src

      - name: Move binary to dist/checkov
        working-directory: checkov-src
        run: |
          SRC=$(find . -maxdepth 2 -type f \( -name 'checkov-nuitka' -o -name 'checkov-nuitka.exe' \) | head -1)
          [ -z "$SRC" ] && { echo "checkov-nuitka not found"; exit 1; }
          mkdir -p dist
          DEST="dist/$(basename "$SRC" | sed 's/checkov-nuitka/checkov/')"
          mv "$SRC" "$DEST"

      - name: Test built binary (patch + imports)
        continue-on-error: true
        working-directory: checkov-src
        run: |
          BIN=$(find dist -maxdepth 1 -type f \( -name 'checkov' -o -name 'checkov.exe' \) | head -1)
          [ -z "$BIN" ] && { echo "dist/checkov binary not found"; exit 1; }
          [ "$RUNNER_OS" != "Windows" ] && chmod +x "$BIN"
          echo "=== Version ==="
          "$BIN" --version
          echo "=== List terraform checks (exercises patched __init__.py) ==="
          list_out=$("$BIN" --list --framework terraform 2>&1)
          list_ret=$?
          echo "$list_out" | head -30
          exit $list_ret

      - name: Remove Nuitka build artifacts (onefile output already in dist/)
        working-directory: checkov-src
        run: |
          rm -rf entry_nuitka.build entry_nuitka.dist entry_nuitka.onefile-build

      - name: List directory contents
        run: ls -la checkov-src

      #      - name: Output compilation-report.xml
      #        run: cat compilation-report.xml

      - name: Zip artifact
        working-directory: checkov-src
        run: zip -r checkov.zip dist

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.github-release.outputs.upload_url }}
          asset_path: checkov-src/checkov.zip
          asset_name: checkov_${{ matrix.name }}_${{ matrix.suffix }}.zip
          asset_content_type: application/zip
