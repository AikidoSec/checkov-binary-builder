# Single workflow using Option A (config). Use nuitka-build-config.yml or
# nuitka-build-cli.yml to test each option separately.
on:
  workflow_dispatch:

name: Build Checkov Binary Using Nuitka

jobs:
  github-release:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.sha }}
          release_name: Release v${{ github.sha }}
          draft: false
          prerelease: false
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: v${{ github.sha }}

  build-release-artifacts:
    strategy:
      matrix:
        include:
          - os: macos-14-xlarge
            name: darwin
            suffix: 'ARM64'
          - os: ubuntu-22.04
            name: linux
            suffix: 'X86_64'
    needs: [github-release]
    if: needs.github-release.outputs.upload_url != ''
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9  # v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9  # v3
        with:
          repository: bridgecrewio/checkov
          ref: 3.2.473
          path: checkov-src
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6  # v6
        with:
          python-version: "3.9"

      - name: Install pipenv
        run: |
          python -m pip install --no-cache-dir --upgrade pipenv

      - name: Set Python path for pipenv
        run: echo "PYTHON_PATH=$(which python)" >> $GITHUB_ENV

      - name: Install dependencies from checkov repo and Nuitka
        working-directory: checkov-src
        run: |
          PIPENV_VENV_IN_PROJECT=1 pipenv sync --python "$PYTHON_PATH"
          pipenv run pip install -e . && pipenv run pip install nuitka

      - name: Discover checkov modules for Nuitka
        run: checkov-src/.venv/bin/python scripts/discover_checkov_modules.py

      - name: List nuitka-generated
        run: |
          ls -la nuitka-generated/
          head -20 nuitka-generated/nuitka-include-modules.txt

#  pipenv run python -m nuitka \
#  --standalone \
#  --follow-imports \
#  --include-module=site \
#  --include-module=checkov \
#  --include-package=cloudsplaining \
#  --include-package=detect_secrets.plugins \
#  --include-package=cloudsplaining.scan \
#  --include-package=colorama \
#  --include-package=tqdm \
#  --include-package-data=hcl2 \
#  --include-package-data=spdx-tools \
#  --include-package-data=pycep \
#  --include-package-data=detect_secrets \
#  --include-package-data=policyuniverse \
#  --include-package-data=policy_sentry \
#  --include-package-data=cloudsplaining \
#  --include-data-dir=checkov=checkov \
#  --include-package-data=checkov \
#  --enable-plugin=pylint-warnings \
#  --output-filename=checkov-nuitka \
#  --lto=yes \
#  --assume-yes-for-downloads \
#  --report=compilation-report.xml \
#  --enable-plugin=anti-bloat \
#  --noinclude-pytest-mode=nofollow \
#  --noinclude-setuptools-mode=nofollow \
#  --follow-stdlib \
#  --prefer-source-code \
#  --python-flag=no_asserts \
#  --python-flag=-O \
#  checkov/main.py

      - name: Build executable (Option A - config)
        run: |
          checkov-src/.venv/bin/python -m nuitka \
            --standalone \
            --follow-imports \
            --output-filename=checkov-nuitka \
            --user-package-configuration-file=nuitka-generated/checkov.nuitka-package.config.yml \
            --include-package=checkov \
            --include-package-data=checkov \
            --include-data-dir=checkov=checkov-src/checkov \
            --include-package-data=hcl2 \
            --include-package-data=license_expression \
            --include-package-data=spdx \
            --include-package-data=pycep \
            --include-package-data=detect_secrets \
            --include-package-data=policy_sentry \
            --include-package-data=cloudsplaining \
            --include-module=cloudsplaining \
            --include-package=detect_secrets.plugins \
            --include-package=cloudsplaining.scan \
            --lto=yes \
            --assume-yes-for-downloads \
            checkov/main.py

      - name: Zip artifact
        run: |
          DIST_DIR=$(find . -maxdepth 1 -type d -name "*.dist" | head -1)
          if [ -z "$DIST_DIR" ]; then echo "No .dist folder found"; exit 1; fi
          zip -r checkov.zip "$DIST_DIR"

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.github-release.outputs.upload_url }}
          asset_path: checkov.zip
          asset_name: checkov_${{ matrix.name }}_${{ matrix.suffix }}.zip
          asset_content_type: application/zip